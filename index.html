<!DOCTYPE html>
<html lang="th" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เรียนไวยากรณ์อาหรับ - StudyArabic Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="logo">StudyArabic</h1>
      <span class="tagline">ไวยากรณ์อาหรับสำหรับมุสลิมไทย</span>
    </div>
    <div class="header-right">
      <div class="stat-badge" id="statLevel">
        <span class="stat-label">ระดับ</span>
        <span class="stat-value" id="levelValue">1</span>
        <span class="stat-name" id="levelName">เริ่มต้น</span>
      </div>
      <div class="stat-badge" id="statScore">
        <span class="stat-label">คะแนน</span>
        <span class="stat-value" id="scoreValue">0</span>
      </div>
      <div class="stat-badge" id="statProgress">
        <span class="stat-label">สำเร็จ</span>
        <span class="stat-value" id="progressValue">0/28</span>
      </div>
      <button class="reset-btn" id="resetBtn" title="รีเซ็ตความก้าวหน้าทั้งหมด">รีเซ็ต</button>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar"></div>
  </div>
</header>

<!-- BADGE POPUP -->
<div class="badge-popup" id="badgePopup">
  <div class="badge-popup-inner">
    <div class="badge-popup-icon" id="badgePopupIcon"></div>
    <div class="badge-popup-title" id="badgePopupTitle"></div>
    <div class="badge-popup-desc" id="badgePopupDesc"></div>
  </div>
</div>

<!-- ROADMAP -->
<main class="roadmap" id="roadmap"></main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-scroll" id="modalScroll">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-quiz" id="modalQuiz"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <p>StudyArabic Roadmap &mdash; เรียนไวยากรณ์อาหรับอย่างเป็นระบบสำหรับมุสลิมไทย</p>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
