<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArabicFast — เรียนไวยากรณ์อาหรับ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <h1 class="logo">ArabicFast</h1>
    </div>
    <div class="header-center">
      <button class="tab-btn active" data-tab="quran">📖 อัลกุรอาน</button>
      <button class="tab-btn" data-tab="hadith">📜 หะดีษ</button>
      <button class="tab-btn" data-tab="ulama">🎧 อุละมาอฺ</button>
    </div>
    <div class="header-right">
      <span class="score-badge" id="scoreBadge">0 คะแนน</span>
      <span class="progress-badge" id="progressBadge">0/0</span>
      <button class="theme-toggle" id="themeToggle" title="สลับ Dark/Light mode">🌙</button>
      <button class="reset-btn" id="resetBtn" title="รีเซ็ต">↺</button>
    </div>
  </div>
</header>

<!-- ROADMAP TITLE -->
<div class="roadmap-title" id="roadmapTitle">
  <h2 id="roadmapHeading">ไวยากรณ์อาหรับสำหรับอ่านอัลกุรอาน</h2>
  <p id="roadmapDesc">เรียนรู้ไวยากรณ์ที่จำเป็นเพื่อเข้าใจอัลกุรอานด้วยตัวเอง</p>
</div>

<!-- ROADMAP TREE -->
<main class="roadmap-container">
  <div class="tree" id="tree"></div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-x" id="modalX">&times;</button>
    <div class="modal-scroll" id="modalScroll">
      <div class="modal-head" id="modalHead"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-quiz" id="modalQuiz"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>
</div>

<!-- BADGE TOAST -->
<div class="toast" id="toast"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
